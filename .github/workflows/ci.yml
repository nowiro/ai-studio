name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  # ── validate-ai is pure Node — runs first, no install needed ──────────────
  validate-ai:
    name: Validate AI config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - name: Validate .ai / .claude / .github parity
        run: node tools/scripts/validate-ai-config.mjs

  # ── docs-audit also pure Node ─────────────────────────────────────────────
  docs-audit:
    name: Docs audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - run: node tools/scripts/doc-audit.mjs

  # ── setup: install deps ────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }

      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install (frozen if lockfile committed, else generate)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "::group::Installing with --frozen-lockfile"
            pnpm install --frozen-lockfile
            echo "::endgroup::"
          else
            echo "::warning::No pnpm-lock.yaml found — installing without frozen lockfile. Commit the generated pnpm-lock.yaml after first install for reproducible builds."
            pnpm install --no-frozen-lockfile
          fi

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - uses: nrwl/nx-set-shas@v4
        with: { error-on-no-successful-workflow: false }

      - name: Skip if empty workspace
        id: graph
        run: |
          if [ -z "$(pnpm exec nx show projects 2>/dev/null)" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Nx workspace has no projects yet — skipping lint."
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Affected lint
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec nx affected -t lint --parallel=3

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - uses: nrwl/nx-set-shas@v4
        with: { error-on-no-successful-workflow: false }

      - name: Skip if empty workspace
        id: graph
        run: |
          if [ -z "$(pnpm exec nx show projects 2>/dev/null)" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Affected typecheck
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec nx affected -t typecheck --parallel=3

  test:
    name: Unit & integration tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - uses: nrwl/nx-set-shas@v4
        with: { error-on-no-successful-workflow: false }

      - name: Skip if empty workspace
        id: graph
        run: |
          if [ -z "$(pnpm exec nx show projects 2>/dev/null)" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Affected test
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec nx affected -t test --parallel=3 --coverage --passWithNoTests

      - uses: actions/upload-artifact@v4
        if: always() && steps.graph.outputs.empty == 'false'
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - uses: nrwl/nx-set-shas@v4
        with: { error-on-no-successful-workflow: false }

      - name: Skip if empty workspace
        id: graph
        run: |
          if [ -z "$(pnpm exec nx show projects 2>/dev/null)" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Affected build
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec nx affected -t build --parallel=3
