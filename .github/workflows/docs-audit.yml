name: Docs audit

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC, 1st of every month
  workflow_dispatch:
    inputs:
      open-issue:
        description: Open a tracking issue with the audit summary
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc }

      # The doc-audit scripts use only Node built-ins — no install required.

      - name: Run scanners
        run: |
          node tools/scripts/scan-docs.mjs
          node tools/scripts/scan-public-api.mjs
          node tools/scripts/doc-audit.mjs

      - name: Upload audit artefacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-audit
          path: |
            tmp/docs-scan.json
            tmp/public-api.json
            tmp/doc-audit-*.md
          retention-days: 30

      - name: Open / update tracking issue
        if: ${{ github.event_name == 'schedule' || inputs.open-issue }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="$(ls -1 tmp/doc-audit-*.md | head -n1)"
          DATE="$(basename "$REPORT" | sed 's/doc-audit-\(.*\)\.md/\1/')"
          BODY="$(cat "$REPORT")"
          TITLE="docs(audit): ${DATE} sweep"

          # Find existing open issue with same title — replace body, else create.
          NUM="$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number // empty')"
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --label "type:docs,needs-triage" --body "$BODY"
          fi
