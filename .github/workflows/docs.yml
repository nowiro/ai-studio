name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "lychee.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "lychee.toml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - name: Lint markdown
        run: pnpm dlx markdownlint-cli2 "**/*.md" "#node_modules" "#dist" "#coverage" "#.nx"

  linkcheck:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
