name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install (frozen if lockfile committed, else generate)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::No pnpm-lock.yaml — installing without frozen lockfile."
            pnpm install --no-frozen-lockfile
          fi

      - uses: nrwl/nx-set-shas@v4
        with: { error-on-no-successful-workflow: false }

      - name: Detect e2e projects
        id: graph
        run: |
          if [ -z "$(pnpm exec nx show projects --with-target=e2e 2>/dev/null)" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No projects with target 'e2e' yet — skipping Playwright."
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}

      - name: Run affected E2E
        if: steps.graph.outputs.empty == 'false'
        run: pnpm exec nx affected -t e2e --parallel=1 --project=${{ matrix.project }}

      - uses: actions/upload-artifact@v4
        if: always() && steps.graph.outputs.empty == 'false'
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
