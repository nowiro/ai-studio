name: PR checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: write

jobs:
  conventional-commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install (frozen if lockfile committed, else generate)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::No pnpm-lock.yaml — installing without frozen lockfile."
            pnpm install --no-frozen-lockfile
          fi
      - run: |
          pnpm exec commitlint \
            --from=${{ github.event.pull_request.base.sha }} \
            --to=${{ github.event.pull_request.head.sha }} \
            --verbose

  pr-title:
    name: PR title format
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            ai
          requireScope: false

  pr-doc-checklist:
    name: Docs checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect public API change
        id: detect
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'libs/.*/src/index\.ts$'; then
            echo "needs_doc=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_doc=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Require docs/ change
        if: steps.detect.outputs.needs_doc == 'true'
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(docs/|README\.md|CONTRIBUTING\.md)'; then
            echo "Public API changed but no docs/ touched. Add a doc-writer pass." >&2
            exit 1
          fi
