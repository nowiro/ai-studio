name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry run (no tag, no GitHub release)
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install (frozen if lockfile committed, else generate)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::No pnpm-lock.yaml — installing without frozen lockfile."
            pnpm install --no-frozen-lockfile
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: nx release (dry run)
        if: ${{ inputs.dry-run }}
        run: pnpm exec nx release --dry-run --skip-publish

      - name: nx release
        if: ${{ !inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec nx release --skip-publish
