name: Security

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday at 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  actions: read

jobs:
  # ── Dependency vulnerability audit ───────────────────────────────────────
  # NOTE: CodeQL requires "Code scanning" to be enabled in repo Settings →
  # Security → Code scanning (available on GitHub Advanced Security / public repos).
  # Use ESLint + sonarjs (already wired in eslint.config.*) for local static analysis.
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      # hashFiles is evaluated BEFORE install, so this is safe to gate on committed lockfile
      - name: Audit production deps (high+ vulnerabilities)
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm audit --audit-level=high --prod
      - name: Audit all deps incl. dev (informational)
        if: hashFiles('pnpm-lock.yaml') != ''
        continue-on-error: true
        run: pnpm audit --audit-level=high
      - name: Audit skipped notice
        if: hashFiles('pnpm-lock.yaml') == ''
        run: echo "::warning::No committed pnpm-lock.yaml — audit skipped. Run pnpm install and commit the lockfile."

  # ── Secret scanning (full history) ───────────────────────────────────────
  secret-scan:
    name: Secret scan (full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Outdated dependency report ────────────────────────────────────────────
  outdated:
    name: Outdated dependency report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      - name: Check outdated
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm outdated || true
      - name: Outdated skipped notice
        if: hashFiles('pnpm-lock.yaml') == ''
        run: echo "::warning::No committed pnpm-lock.yaml — outdated check skipped."
