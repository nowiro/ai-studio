name: Security

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday at 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── CodeQL static analysis ────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # ── Dependency vulnerability audit ───────────────────────────────────────
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      - name: Audit production dependencies
        run: pnpm audit --audit-level=moderate --prod
      - name: Audit all dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true # advisory for dev deps

  # ── Secret scanning (full history) ───────────────────────────────────────
  secret-scan:
    name: Secret scan (full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Outdated dependency report ────────────────────────────────────────────
  outdated:
    name: Outdated dependency report
    runs-on: ubuntu-latest
    continue-on-error: true # advisory — never blocks
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      - run: pnpm outdated || true
