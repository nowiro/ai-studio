name: Security

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday at 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── CodeQL static analysis ────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    continue-on-error: true # requires "Code scanning" enabled in repo settings
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  # ── Dependency vulnerability audit ───────────────────────────────────────
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      - name: Audit (requires lockfile)
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::warning::No pnpm-lock.yaml — audit skipped. Commit the lockfile to enable vulnerability scanning."
            exit 0
          fi
          pnpm audit --audit-level=high

  # ── Secret scanning (full history) ───────────────────────────────────────
  secret-scan:
    name: Secret scan (full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Outdated dependency report ────────────────────────────────────────────
  outdated:
    name: Outdated dependency report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc }
      - uses: actions/cache@v4
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          else pnpm install --no-frozen-lockfile; fi
      - name: Check outdated (requires lockfile)
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::warning::No pnpm-lock.yaml — outdated check skipped."
            exit 0
          fi
          pnpm outdated || true
