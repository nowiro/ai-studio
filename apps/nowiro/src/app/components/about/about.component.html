<ais-section
  id="about"
  [subtitle]="t().about.sectionSubtitle"
  [title]="t().about.sectionTitle"
  tone="surface"
>
  <div class="about-grid">
    <div class="about-text">
      <!--
        [innerHTML] safety note (Angular best practices §10, §20):
        Content comes from `translations.ts` — static, repo-owned copy that
        contains `<strong>` accents only. Angular's `DomSanitizer` runs on
        every [innerHTML] binding (SecurityContext.HTML) and strips any
        unexpected tags / event handlers / javascript: URLs. There is no
        user-supplied input on this path — so this is a safe-by-design use.
      -->
      <p [innerHTML]="t().about.p1"></p>
      <p [innerHTML]="t().about.p2"></p>
      <p [innerHTML]="t().about.p3"></p>
    </div>
    <div class="about-stats">
      @for (stat of t().about.stats; track stat.label; let i = $index) {
        <ais-stat-tile
          [icon]="stat.icon"
          [label]="stat.label"
          [revealDelay]="i * 100"
          [value]="stat.value"
        />
      }
    </div>
  </div>
</ais-section>
