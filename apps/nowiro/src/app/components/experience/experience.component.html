<section id="experience">
  <div class="container">
    <h2 class="section-title">{{ t().experience.sectionTitle }}</h2>
    <p class="section-subtitle">{{ t().experience.sectionSubtitle }}</p>

    <div class="timeline">
      @for (item of t().experience.items; track item.period) {
        <mat-card
          class="timeline-card"
          appearance="outlined"
        >
          <mat-card-content>
            <div class="timeline-header">
              <span class="timeline-period">{{ item.period }}</span>
              <span class="timeline-company">{{ item.sector }}</span>
            </div>
            <h3 class="timeline-role">{{ item.service }}</h3>
            <p class="timeline-description">{{ item.description }}</p>
            <mat-chip-set>
              @for (tech of item.technologies; track tech) {
                <mat-chip>{{ tech }}</mat-chip>
              }
            </mat-chip-set>
          </mat-card-content>
        </mat-card>
      }
    </div>
  </div>
</section>
