<ais-section
  id="services"
  [subtitle]="t().services.sectionSubtitle"
  [title]="t().services.sectionTitle"
  tone="surface-low"
>
  <div class="services-grid">
    @for (service of t().services.items; track service.title; let i = $index) {
      <ais-feature-card
        [description]="service.description"
        [icon]="service.icon"
        [revealDelay]="i * 80"
        [title]="service.title"
      />
    }
  </div>
</ais-section>
