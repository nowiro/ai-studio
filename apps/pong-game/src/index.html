<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pong — AI Studio</title>
    <!--
      `<base href="/">` so any future deep link (e.g. `/highscore/123`) loads
      script/asset URLs from the document root rather than the current path.
      Without it, refreshing on a multi-segment URL gives a blank page because
      the browser resolves `main.js` relative to the current directory.
    -->
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <!--
      Content Security Policy (Angular best practices §11).
      `img-src blob:` allows Phaser to render canvas-generated sprites.
      `unsafe-inline` covers Angular's inline boot script + Material inline styles.
    -->
    <!-- `frame-ancestors` is intentionally omitted — browsers ignore it when
         delivered via <meta> (spec). Set at the HTTP layer in production. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; base-uri 'self'"
    />
    <meta
      name="referrer"
      content="strict-origin-when-cross-origin"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon.ico"
    />
  </head>
  <body class="bg-surface text-on-surface">
    <ais-root></ais-root>
  </body>
</html>
