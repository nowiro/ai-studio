<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>AI Studio · Portal</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <!--
      Portal CSP — clarification from /clarify: portal owns the CSP for
      itself + every loaded remote. WC bundles ship no CSP meta and
      inherit this one. See ADR-0009 + ADR-0012.

      `script-src 'self'` covers both the portal bundle and the dynamically
      injected `<script type="module" src="/element-bundles/...">` tags.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.frankfurter.dev https://www.floatrates.com; base-uri 'self'; form-action 'self'"
    />
    <meta
      name="referrer"
      content="strict-origin-when-cross-origin"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined"
      rel="stylesheet"
    />
  </head>
  <body class="bg-surface text-on-surface">
    <ais-root></ais-root>
  </body>
</html>
