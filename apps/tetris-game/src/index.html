<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tetris — AI Studio</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <!--
      CSP — `img-src blob:` is unnecessary (we render via canvas, no images).
      `frame-ancestors` is intentionally omitted (browsers ignore it via <meta>;
      set as an HTTP header at deploy time).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'"
    />
    <meta
      name="referrer"
      content="strict-origin-when-cross-origin"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon.ico"
    />
  </head>
  <body class="bg-surface text-on-surface">
    <ais-root></ais-root>
  </body>
</html>
