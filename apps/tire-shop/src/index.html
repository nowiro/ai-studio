<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Sklep z oponami — AI Studio</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <!--
      CSP — `img-src https:` is required for the Picsum.photos seed images used
      by the catalogue. `frame-ancestors` omitted (browsers ignore it via <meta>;
      set as an HTTP header at deploy time).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; base-uri 'self'; form-action 'self'"
    />
    <meta
      name="referrer"
      content="strict-origin-when-cross-origin"
    />
    <meta
      name="description"
      content="Demo sklepu z oponami w Angular 21 / Nx — katalog z filtrami, koszyk i 4-krokowy checkout."
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon.ico"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
  </head>
  <body class="bg-surface text-on-surface">
    <ais-root></ais-root>
  </body>
</html>
