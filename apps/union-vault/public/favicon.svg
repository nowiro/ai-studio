<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="16" cy="16" fill="#003399" r="16" />

  <!-- Gold border ring -->
  <circle cx="16" cy="16" fill="none" r="14.5" stroke="#FFCC00" stroke-width="1.5" />

  <!-- 8 tiny star-dots at r=11.5 (every 45°) -->
  <circle cx="16" cy="4.5" fill="#FFCC00" r="1.4" />
  <circle cx="24.6" cy="8.1" fill="#FFCC00" r="1.4" />
  <circle cx="27.5" cy="16" fill="#FFCC00" r="1.4" />
  <circle cx="24.6" cy="23.9" fill="#FFCC00" r="1.4" />
  <circle cx="16" cy="27.5" fill="#FFCC00" r="1.4" />
  <circle cx="7.4" cy="23.9" fill="#FFCC00" r="1.4" />
  <circle cx="4.5" cy="16" fill="#FFCC00" r="1.4" />
  <circle cx="7.4" cy="8.1" fill="#FFCC00" r="1.4" />

  <!-- Vault door circle -->
  <circle cx="16" cy="16" fill="#001F6B" r="9" stroke="#FFCC00" stroke-width="1.4" />

  <!-- 6 spokes -->
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="16" x2="16" y1="13.8" y2="9.5" />
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="17.9" x2="21.2" y1="14.9" y2="13" />
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="17.9" x2="21.2" y1="17.1" y2="19" />
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="16" x2="16" y1="18.2" y2="22.5" />
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="14.1" x2="10.8" y1="17.1" y2="19" />
  <line stroke="#FFCC00" stroke-linecap="round" stroke-width="1.4" x1="14.1" x2="10.8" y1="14.9" y2="13" />

  <!-- Hub ring -->
  <circle cx="16" cy="16" fill="#001F6B" r="2.2" stroke="#FFCC00" stroke-width="1.4" />

  <!-- Center dot -->
  <circle cx="16" cy="16" fill="#FFCC00" r="1" />
</svg>
