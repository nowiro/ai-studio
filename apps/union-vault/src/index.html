<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>UnionVault.eu — Twój skarbiec danych finansowych UE</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <!--
      Content Security Policy (Angular best practices §11).
      Whitelists: Google Fonts (CSS + woff2), flag-icons CDN (CSS + SVG flags),
      Frankfurter EUR rates API, FloatRates fallback. `unsafe-inline` for Angular
      inline boot + Material/Tailwind inline styles.
    -->
    <!-- `frame-ancestors` is intentionally omitted — browsers ignore it when
         delivered via <meta> (spec). Set at the HTTP layer in production. -->
    <meta
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.frankfurter.dev https://www.floatrates.com; base-uri 'self'; form-action 'self'"
      http-equiv="Content-Security-Policy"
    />
    <meta
      name="referrer"
      content="strict-origin-when-cross-origin"
    />
    <meta
      name="description"
      content="UnionVault.eu — paneuropejska platforma agregująca oferty kredytowe, kursy walut i ceny nieruchomości z 27 krajów Unii Europejskiej."
    />

    <!-- Favicon & icons -->
    <link
      href="favicon.svg"
      rel="icon"
      type="image/svg+xml"
    />
    <link
      href="favicon.ico"
      rel="icon"
      sizes="48x48"
      type="image/x-icon"
    />
    <link
      href="icon.svg"
      rel="apple-touch-icon"
      type="image/svg+xml"
    />

    <!-- PWA manifest -->
    <link
      href="site.webmanifest"
      rel="manifest"
    />
    <meta
      name="theme-color"
      content="#001F6B"
    />
    <meta
      name="msapplication-TileColor"
      content="#001F6B"
    />

    <!-- Open Graph / Social -->
    <meta
      content="UnionVault.eu — Twój skarbiec danych finansowych UE"
      property="og:title"
    />
    <meta
      content="Paneuropejska platforma agregująca oferty kredytowe, kursy walut i ceny nieruchomości z 27 krajów Unii Europejskiej."
      property="og:description"
    />
    <meta
      content="website"
      property="og:type"
    />
    <meta
      content="https://www.unionvault.eu"
      property="og:url"
    />
    <meta
      content="https://www.unionvault.eu/icon.svg"
      property="og:image"
    />
    <meta
      content="UnionVault.eu"
      property="og:site_name"
    />

    <!-- Twitter Card -->
    <meta
      name="twitter:card"
      content="summary"
    />
    <meta
      name="twitter:title"
      content="UnionVault.eu — Twój skarbiec danych finansowych UE"
    />
    <meta
      name="twitter:description"
      content="Paneuropejska platforma agregująca oferty kredytowe, kursy walut i ceny nieruchomości z 27 krajów Unii Europejskiej."
    />

    <!-- Flag icons (cross-platform SVG flags via CDN — no npm dep needed) -->
    <link
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
  </head>
  <body>
    <ais-root></ais-root>
  </body>
</html>
