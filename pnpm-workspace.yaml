# Native build scripts allow-list (pnpm 11+). Without this, pnpm warns at every
# install. We trust these packages — they ship native bindings (file watchers,
# esbuild binary, LMDB) or post-install codemods (nx, core-js shims).
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  puppeteer: true
  # unrs-resolver: native bindings used by eslint-plugin-import-x for fast module
  # resolution. Trusted (Rust binary auto-fetched per platform).
  unrs-resolver: true
minimumReleaseAgeExclude:
  - "@vitest/coverage-v8@4.1.7"
  - "@vitest/expect@4.1.7"
  - "@vitest/mocker@4.1.7"
  - "@vitest/pretty-format@4.1.7"
  - "@vitest/runner@4.1.7"
  - "@vitest/snapshot@4.1.7"
  - "@vitest/spy@4.1.7"
  - "@vitest/utils@4.1.7"
  - vitest@4.1.7
  - "@angular-devkit/architect@0.2102.12"
  - "@angular-devkit/core@21.2.12"
  - "@angular-devkit/schematics@21.2.12"
  - "@angular/animations@21.2.14"
  - "@angular/build@21.2.12"
  - "@angular/cdk@21.2.12"
  - "@angular/cli@21.2.12"
  - "@angular/common@21.2.14"
  - "@angular/compiler-cli@21.2.14"
  - "@angular/compiler@21.2.14"
  - "@angular/core@21.2.14"
  - "@angular/forms@21.2.14"
  - "@angular/language-service@21.2.14"
  - "@angular/material@21.2.12"
  - "@angular/platform-browser@21.2.14"
  - "@angular/router@21.2.14"
  - "@schematics/angular@21.2.12"
  - eslint-plugin-jsdoc@63.0.0
